<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1320 720" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="mIceWriter v2 end-to-end data flow. Startup and registration: the SDK scans @IcebergEntity classes, resolves each table to a pipeline endpoint, calls REGISTER_SCHEMA over gRPC, and the pipeline ensures the Iceberg table exists in the catalog. Hot path: the app calls icebergTemplate.send(pojo); the SDK routes by table and streams CBOR records over gRPC; the pipeline appends to its active RocksDB column family and ACKs in sub-milliseconds. Flush cycle: each pod rotates its column family on a jittered ~10 minute timer or 32 MB, reads the frozen column family, transpiles CBOR to NDJSON to Arrow to Parquet, PUTs Parquet files to the object store, runs a FastAppendAction commit against the catalog, and drops the frozen column family.">
  <defs>
    <marker id="aSky" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#7dd3fc"/></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#a5b4fc"/></marker>
    <marker id="aTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#5eead4"/></marker>
    <marker id="aRet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="1320" height="720" fill="#0f172a"/>
  <rect x="0" y="0" width="1320" height="720" fill="url(#bgGrad)"/>

  <!-- title -->
  <text x="40" y="40" fill="#e2e8f0" font-size="22" font-weight="700">mIceWriter &#8212; v2 End-to-End Data Flow</text>
  <text x="41" y="62" fill="#94a3b8" font-size="13">Startup registration &#183; sub-millisecond hot path &#183; hybrid time/size flush cycle</text>

  <!-- legend -->
  <g font-size="11" fill="#94a3b8">
    <circle cx="980" cy="34" r="4.5" fill="#a5b4fc"/><text x="992" y="38">registration</text>
    <circle cx="1080" cy="34" r="4.5" fill="#7dd3fc"/><text x="1092" y="38">hot path (CBOR)</text>
    <circle cx="1210" cy="34" r="4.5" fill="#5eead4"/><text x="1222" y="38">flush</text>
  </g>

  <!-- ============ phase bands ============ -->
  <rect x="20" y="156" width="1280" height="146" rx="10" fill="#1a1840" fill-opacity="0.35" stroke="#312e81" stroke-width="1"/>
  <rect x="20" y="306" width="1280" height="160" rx="10" fill="#0c2a3a" fill-opacity="0.45" stroke="#155e6b" stroke-width="1"/>
  <rect x="20" y="470" width="1280" height="232" rx="10" fill="#0c2b27" fill-opacity="0.45" stroke="#155e57" stroke-width="1"/>
  <text x="34" y="176" fill="#a5b4fc" font-size="12.5" font-weight="700">STARTUP &amp; REGISTRATION</text>
  <text x="34" y="326" fill="#7dd3fc" font-size="12.5" font-weight="700">HOT PATH &#8212; sub-ms ack</text>
  <text x="34" y="490" fill="#5eead4" font-size="12.5" font-weight="700">FLUSH CYCLE &#8212; per pod</text>

  <!-- ============ lifelines ============ -->
  <g stroke="#334155" stroke-width="1.3" stroke-dasharray="4 5">
    <line x1="100" y1="144" x2="100" y2="694"/>
    <line x1="270" y1="144" x2="270" y2="694"/>
    <line x1="440" y1="144" x2="440" y2="694"/>
    <line x1="640" y1="144" x2="640" y2="694"/>
    <line x1="830" y1="144" x2="830" y2="694"/>
    <line x1="1010" y1="144" x2="1010" y2="694"/>
    <line x1="1200" y1="144" x2="1200" y2="694"/>
  </g>

  <!-- activation bars on Pipeline lifeline -->
  <g fill="#1e293b" stroke="#38bdf8" stroke-width="1" opacity="0.9">
    <rect x="634" y="244" width="12" height="56" rx="2"/>
    <rect x="634" y="388" width="12" height="66" rx="2"/>
    <rect x="634" y="496" width="12" height="166" rx="2"/>
  </g>

  <!-- ============ participant boxes ============ -->
  <g>
    <rect x="32" y="92" width="136" height="52" rx="9" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="100" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">Java App</text>
    <text x="100" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">Spring Boot / Dropwizard</text>

    <rect x="202" y="92" width="136" height="52" rx="9" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="270" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">mIceWriter SDK</text>
    <text x="270" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">Java</text>

    <rect x="372" y="92" width="136" height="52" rx="9" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
    <text x="440" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">Table Resolver</text>
    <text x="440" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">convention + overrides</text>

    <rect x="568" y="92" width="144" height="52" rx="9" fill="#15202f" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="640" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">engine-{table}</text>
    <text x="640" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">Service &#183; HPA pods</text>

    <rect x="762" y="92" width="136" height="52" rx="9" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
    <text x="830" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">RocksDB</text>
    <text x="830" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">per-pod buffer</text>

    <rect x="942" y="92" width="136" height="52" rx="9" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="1010" y="116" fill="#ccfbf1" font-size="13" font-weight="600" text-anchor="middle">Iceberg Catalog</text>
    <text x="1010" y="133" fill="#5b7d76" font-size="9.5" text-anchor="middle">Nessie / Glue</text>

    <rect x="1132" y="92" width="136" height="52" rx="9" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="1200" y="116" fill="#ccfbf1" font-size="13" font-weight="600" text-anchor="middle">Object Store</text>
    <text x="1200" y="133" fill="#5b7d76" font-size="9.5" text-anchor="middle">MinIO / AWS S3</text>
  </g>

  <!-- ============ messages ============ -->
  <!-- helper: number badge + arrow + label -->

  <!-- STARTUP -->
  <!-- 1: SDK self scan -->
  <path d="M270,184 C338,182 338,200 272,198" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="346" y="186" fill="#c7d2fe" font-size="11">Scan @IcebergEntity classes</text>
  <circle cx="270" cy="184" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="270" y="188" fill="#c7d2fe" font-size="10" text-anchor="middle">1</text>

  <!-- 2: SDK -> Resolver -->
  <line x1="270" y1="218" x2="440" y2="218" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="355" y="211" fill="#c7d2fe" font-size="11" text-anchor="middle">table &#8594; endpoint</text>
  <circle cx="270" cy="218" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="270" y="222" fill="#c7d2fe" font-size="10" text-anchor="middle">2</text>

  <!-- 3: SDK -> Pipeline -->
  <line x1="270" y1="252" x2="634" y2="252" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="452" y="245" fill="#c7d2fe" font-size="11" text-anchor="middle">REGISTER_SCHEMA (gRPC unary, bounded retry)</text>
  <circle cx="270" cy="252" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="270" y="256" fill="#c7d2fe" font-size="10" text-anchor="middle">3</text>

  <!-- 4: Pipeline -> Catalog -->
  <line x1="646" y1="278" x2="1010" y2="278" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="828" y="271" fill="#c7d2fe" font-size="11" text-anchor="middle">Ensure Iceberg table exists</text>
  <circle cx="646" cy="278" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="646" y="282" fill="#c7d2fe" font-size="10" text-anchor="middle">4</text>

  <!-- 5: Catalog --> Pipeline (return) -->
  <line x1="1010" y1="296" x2="648" y2="296" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aRet)"/>
  <text x="828" y="290" fill="#94a3b8" font-size="10.5" text-anchor="middle">Ready</text>

  <!-- HOT PATH -->
  <!-- 6: App -> SDK -->
  <line x1="100" y1="336" x2="270" y2="336" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="185" y="329" fill="#bae6fd" font-size="11" text-anchor="middle">icebergTemplate.send(pojo)</text>
  <circle cx="100" cy="336" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="100" y="340" fill="#bae6fd" font-size="10" text-anchor="middle">6</text>

  <!-- 7: SDK self route -->
  <path d="M270,364 C338,362 338,380 272,378" fill="none" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="346" y="366" fill="#bae6fd" font-size="11">Route by @IcebergEntity.table</text>
  <circle cx="270" cy="364" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="270" y="368" fill="#bae6fd" font-size="10" text-anchor="middle">7</text>

  <!-- 8: SDK -> Pipeline -->
  <line x1="270" y1="398" x2="634" y2="398" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="452" y="391" fill="#bae6fd" font-size="11" text-anchor="middle">Ingest stream (CBOR bytes over gRPC)</text>
  <circle cx="270" cy="398" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="270" y="402" fill="#bae6fd" font-size="10" text-anchor="middle">8</text>

  <!-- 9: Pipeline -> RocksDB -->
  <line x1="646" y1="426" x2="830" y2="426" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="738" y="419" fill="#bae6fd" font-size="11" text-anchor="middle">Append to active CF</text>
  <circle cx="646" cy="426" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="646" y="430" fill="#bae6fd" font-size="10" text-anchor="middle">9</text>

  <!-- 10: Pipeline --> SDK (ACK return) -->
  <line x1="634" y1="452" x2="272" y2="452" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aRet)"/>
  <text x="452" y="446" fill="#94a3b8" font-size="10.5" text-anchor="middle">ACK (sub-millisecond)</text>

  <!-- FLUSH -->
  <!-- 11: Pipeline self rotate -->
  <path d="M646,504 C714,502 714,520 648,518" fill="none" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="722" y="506" fill="#99f6e4" font-size="11">Rotate CF: 10 min &#177; 2 min  OR  32 MB</text>
  <circle cx="646" cy="504" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="646" y="508" fill="#99f6e4" font-size="9.5" text-anchor="middle">11</text>

  <!-- 12: Pipeline -> RocksDB read frozen -->
  <line x1="646" y1="534" x2="830" y2="534" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="738" y="527" fill="#99f6e4" font-size="11" text-anchor="middle">Read frozen CF</text>
  <circle cx="646" cy="534" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="646" y="538" fill="#99f6e4" font-size="9.5" text-anchor="middle">12</text>

  <!-- 13: Pipeline self compile -->
  <path d="M646,564 C714,562 714,580 648,578" fill="none" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="722" y="566" fill="#99f6e4" font-size="11">CBOR &#8594; NDJSON &#8594; Arrow &#8594; Parquet</text>
  <circle cx="646" cy="564" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="646" y="568" fill="#99f6e4" font-size="9.5" text-anchor="middle">13</text>

  <!-- 14: Pipeline -> Object Store -->
  <line x1="646" y1="596" x2="1200" y2="596" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="923" y="589" fill="#99f6e4" font-size="11" text-anchor="middle">PUT Parquet files</text>
  <circle cx="646" cy="596" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="646" y="600" fill="#99f6e4" font-size="9.5" text-anchor="middle">14</text>

  <!-- 15: Pipeline -> Catalog commit -->
  <line x1="646" y1="626" x2="1010" y2="626" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="828" y="619" fill="#99f6e4" font-size="11" text-anchor="middle">FastAppendAction commit (backoff on conflict)</text>
  <circle cx="646" cy="626" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="646" y="630" fill="#99f6e4" font-size="9.5" text-anchor="middle">15</text>

  <!-- 16: Pipeline -> RocksDB drop -->
  <line x1="646" y1="656" x2="830" y2="656" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="738" y="649" fill="#99f6e4" font-size="11" text-anchor="middle">Drop frozen CF</text>
  <circle cx="646" cy="656" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="646" y="660" fill="#99f6e4" font-size="9.5" text-anchor="middle">16</text>

  <!-- ============ animated packets ============ -->
  <!-- startup (indigo) -->
  <circle r="4" fill="#a5b4fc"><animateMotion dur="1.5s" repeatCount="indefinite" path="M270,218 L440,218"/></circle>
  <circle r="4" fill="#a5b4fc"><animateMotion dur="2.0s" repeatCount="indefinite" path="M270,252 L634,252"/></circle>
  <circle r="4" fill="#a5b4fc"><animateMotion dur="2.0s" begin="0.4s" repeatCount="indefinite" path="M646,278 L1010,278"/></circle>
  <!-- hot path (sky) -->
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.3s" repeatCount="indefinite" path="M100,336 L270,336"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.3s" begin="0.65s" repeatCount="indefinite" path="M100,336 L270,336"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.8s" repeatCount="indefinite" path="M270,398 L634,398"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.2s" repeatCount="indefinite" path="M646,426 L830,426"/></circle>
  <!-- flush (teal) -->
  <circle r="4.5" fill="#5eead4"><animateMotion dur="1.4s" repeatCount="indefinite" path="M646,534 L830,534"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.6s" repeatCount="indefinite" path="M646,596 L1200,596"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.2s" begin="0.5s" repeatCount="indefinite" path="M646,626 L1010,626"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="1.4s" begin="0.3s" repeatCount="indefinite" path="M646,656 L830,656"/></circle>
</svg>
