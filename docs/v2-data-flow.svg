<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1320 800" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="mIceWriter v2 end-to-end data flow with leader election.">
  <defs>
    <marker id="aSky" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#7dd3fc"/></marker>
    <marker id="aIndigo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#a5b4fc"/></marker>
    <marker id="aTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#5eead4"/></marker>
    <marker id="aRet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="1320" height="800" fill="#0f172a"/>
  <rect x="0" y="0" width="1320" height="800" fill="url(#bgGrad)"/>

  <text x="40" y="40" fill="#e2e8f0" font-size="22" font-weight="700">mIceWriter &#8212; v2 End-to-End Data Flow</text>
  <text x="41" y="62" fill="#94a3b8" font-size="13">Startup registration &#183; sub-millisecond hot path &#183; two-phase flush cycle (Leader Election)</text>

  <g font-size="11" fill="#94a3b8">
    <circle cx="980" cy="34" r="4.5" fill="#a5b4fc"/><text x="992" y="38">registration</text>
    <circle cx="1080" cy="34" r="4.5" fill="#7dd3fc"/><text x="1092" y="38">hot path (CBOR)</text>
    <circle cx="1210" cy="34" r="4.5" fill="#5eead4"/><text x="1222" y="38">flush</text>
  </g>

  <!-- ============ phase bands ============ -->
  <rect x="20" y="156" width="1280" height="146" rx="10" fill="#1a1840" fill-opacity="0.35" stroke="#312e81" stroke-width="1"/>
  <rect x="20" y="306" width="1280" height="160" rx="10" fill="#0c2a3a" fill-opacity="0.45" stroke="#155e6b" stroke-width="1"/>
  <rect x="20" y="470" width="1280" height="310" rx="10" fill="#0c2b27" fill-opacity="0.45" stroke="#155e57" stroke-width="1"/>
  <text x="34" y="176" fill="#a5b4fc" font-size="12.5" font-weight="700">STARTUP &amp; REGISTRATION</text>
  <text x="34" y="326" fill="#7dd3fc" font-size="12.5" font-weight="700">HOT PATH &#8212; sub-ms ack</text>
  <text x="34" y="490" fill="#5eead4" font-size="12.5" font-weight="700">FLUSH CYCLE &#8212; two-phase commit</text>

  <!-- ============ lifelines ============ -->
  <g stroke="#334155" stroke-width="1.3" stroke-dasharray="4 5">
    <line x1="90" y1="144" x2="90" y2="760"/>
    <line x1="220" y1="144" x2="220" y2="760"/>
    <line x1="360" y1="144" x2="360" y2="760"/>
    <line x1="510" y1="144" x2="510" y2="760"/>
    <line x1="650" y1="144" x2="650" y2="760"/>
    <line x1="800" y1="144" x2="800" y2="760"/>
    <line x1="950" y1="144" x2="950" y2="760"/>
    <line x1="1100" y1="144" x2="1100" y2="760"/>
  </g>

  <!-- ============ participant boxes ============ -->
  <g>
    <rect x="22" y="92" width="136" height="52" rx="9" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="90" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">Java App</text>
    <text x="90" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">Spring Boot</text>

    <rect x="162" y="92" width="116" height="52" rx="9" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="220" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">SDK</text>
    <text x="220" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">Java</text>

    <rect x="292" y="92" width="136" height="52" rx="9" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
    <text x="360" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">Table Resolver</text>
    <text x="360" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">convention map</text>

    <rect x="442" y="92" width="136" height="52" rx="9" fill="#15202f" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="510" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">Worker Pod</text>
    <text x="510" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">HPA replicated</text>

    <rect x="582" y="92" width="136" height="52" rx="9" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
    <text x="650" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">RocksDB</text>
    <text x="650" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">local to worker</text>

    <rect x="732" y="92" width="136" height="52" rx="9" fill="#15202f" stroke="#2dd4bf" stroke-width="1.8"/>
    <text x="800" y="116" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">Leader Pod</text>
    <text x="800" y="133" fill="#64748b" font-size="9.5" text-anchor="middle">K8s Lease holder</text>

    <rect x="882" y="92" width="136" height="52" rx="9" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="950" y="116" fill="#ccfbf1" font-size="13" font-weight="600" text-anchor="middle">Object Store</text>
    <text x="950" y="133" fill="#5b7d76" font-size="9.5" text-anchor="middle">MinIO / S3</text>

    <rect x="1032" y="92" width="136" height="52" rx="9" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="1100" y="116" fill="#ccfbf1" font-size="13" font-weight="600" text-anchor="middle">Iceberg Catalog</text>
    <text x="1100" y="133" fill="#5b7d76" font-size="9.5" text-anchor="middle">Nessie / Glue</text>
  </g>

  <!-- STARTUP -->
  <path d="M220,184 C288,182 288,200 222,198" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="296" y="186" fill="#c7d2fe" font-size="11">Scan @IcebergEntity classes</text>
  <circle cx="220" cy="184" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="220" y="188" fill="#c7d2fe" font-size="10" text-anchor="middle">1</text>

  <line x1="220" y1="218" x2="360" y2="218" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="290" y="211" fill="#c7d2fe" font-size="11" text-anchor="middle">table &#8594; endpoint</text>
  <circle cx="220" cy="218" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="220" y="222" fill="#c7d2fe" font-size="10" text-anchor="middle">2</text>

  <line x1="220" y1="252" x2="504" y2="252" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="365" y="245" fill="#c7d2fe" font-size="11" text-anchor="middle">REGISTER_SCHEMA (Strict Safety Handshake)</text>
  <circle cx="220" cy="252" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="220" y="256" fill="#c7d2fe" font-size="10" text-anchor="middle">3</text>

  <line x1="516" y1="278" x2="1100" y2="278" stroke="#818cf8" stroke-width="1.8" marker-end="url(#aIndigo)"/>
  <text x="808" y="271" fill="#c7d2fe" font-size="11" text-anchor="middle">Ensure Iceberg table exists</text>
  <circle cx="516" cy="278" r="8" fill="#312e81" stroke="#818cf8" stroke-width="1"/><text x="516" y="282" fill="#c7d2fe" font-size="10" text-anchor="middle">4</text>

  <!-- HOT PATH -->
  <line x1="90" y1="336" x2="220" y2="336" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="155" y="329" fill="#bae6fd" font-size="11" text-anchor="middle" textLength="120" lengthAdjust="spacingAndGlyphs">sendAsyncWithRetry()</text>
  <circle cx="90" cy="336" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="90" y="340" fill="#bae6fd" font-size="10" text-anchor="middle">5</text>

  <path d="M220,364 C288,362 288,380 222,378" fill="none" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="296" y="366" fill="#bae6fd" font-size="11">Route by @IcebergEntity.table</text>
  <circle cx="220" cy="364" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="220" y="368" fill="#bae6fd" font-size="10" text-anchor="middle">6</text>

  <line x1="220" y1="398" x2="504" y2="398" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="365" y="391" fill="#bae6fd" font-size="11" text-anchor="middle">Ingest stream (CBOR bytes over gRPC)</text>
  <circle cx="220" cy="398" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="220" y="402" fill="#bae6fd" font-size="10" text-anchor="middle">7</text>

  <line x1="516" y1="426" x2="650" y2="426" stroke="#7dd3fc" stroke-width="1.8" marker-end="url(#aSky)"/>
  <text x="583" y="419" fill="#bae6fd" font-size="11" text-anchor="middle">Append to active CF</text>
  <circle cx="516" cy="426" r="8" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/><text x="516" y="430" fill="#bae6fd" font-size="10" text-anchor="middle">8</text>

  <line x1="504" y1="452" x2="222" y2="452" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aRet)"/>
  <text x="365" y="446" fill="#94a3b8" font-size="10.5" text-anchor="middle">ACK (sub-millisecond)</text>

  <!-- FLUSH -->
  <path d="M516,504 C584,502 584,520 518,518" fill="none" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="592" y="506" fill="#99f6e4" font-size="11">Rotate CF: 10 min &#177; 2 min  OR  32 MB</text>
  <circle cx="516" cy="504" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="516" y="508" fill="#99f6e4" font-size="9.5" text-anchor="middle">9</text>

  <line x1="516" y1="534" x2="650" y2="534" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="583" y="527" fill="#99f6e4" font-size="11" text-anchor="middle">Read frozen CF</text>
  <circle cx="516" cy="534" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="516" y="538" fill="#99f6e4" font-size="9.5" text-anchor="middle">10</text>

  <path d="M516,564 C584,562 584,580 518,578" fill="none" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="592" y="566" fill="#99f6e4" font-size="11">AOT CBOR &#8594; Static Arrow Builders &#8594; Parquet (deterministic)</text>
  <circle cx="516" cy="564" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="516" y="568" fill="#99f6e4" font-size="9.5" text-anchor="middle">11</text>

  <line x1="516" y1="596" x2="950" y2="596" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="733" y="589" fill="#99f6e4" font-size="11" text-anchor="middle">PUT Parquet files</text>
  <circle cx="516" cy="596" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="516" y="600" fill="#99f6e4" font-size="9.5" text-anchor="middle">12</text>

  <line x1="516" y1="636" x2="800" y2="636" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="658" y="629" fill="#99f6e4" font-size="11" text-anchor="middle">gRPC CommitBatch(s3_paths)</text>
  <circle cx="516" cy="636" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="516" y="640" fill="#99f6e4" font-size="9.5" text-anchor="middle">13</text>

  <line x1="800" y1="676" x2="1100" y2="676" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="950" y="669" fill="#99f6e4" font-size="11" text-anchor="middle">5-Minute Aggregated FastAppendAction Commit</text>
  <circle cx="800" cy="676" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="800" y="680" fill="#99f6e4" font-size="9.5" text-anchor="middle">14</text>
  
  <line x1="800" y1="716" x2="516" y2="716" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aRet)"/>
  <text x="658" y="709" fill="#94a3b8" font-size="10.5" text-anchor="middle">ACK Commit</text>

  <line x1="516" y1="746" x2="650" y2="746" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#aTeal)"/>
  <text x="583" y="739" fill="#99f6e4" font-size="11" text-anchor="middle">Drop frozen CF</text>
  <circle cx="516" cy="746" r="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/><text x="516" y="750" fill="#99f6e4" font-size="9.5" text-anchor="middle">15</text>

  <!-- ============ animated packets ============ -->
  <circle r="4" fill="#a5b4fc"><animateMotion dur="1.5s" repeatCount="indefinite" path="M220,218 L360,218"/></circle>
  <circle r="4" fill="#a5b4fc"><animateMotion dur="2.0s" repeatCount="indefinite" path="M220,252 L504,252"/></circle>
  <circle r="4" fill="#a5b4fc"><animateMotion dur="2.0s" begin="0.4s" repeatCount="indefinite" path="M516,278 L1100,278"/></circle>
  
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.3s" repeatCount="indefinite" path="M90,336 L220,336"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.8s" repeatCount="indefinite" path="M220,398 L504,398"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.2s" repeatCount="indefinite" path="M516,426 L650,426"/></circle>
  
  <circle r="4.5" fill="#5eead4"><animateMotion dur="1.4s" repeatCount="indefinite" path="M516,534 L650,534"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.6s" repeatCount="indefinite" path="M516,596 L950,596"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="1.5s" begin="0.5s" repeatCount="indefinite" path="M516,636 L800,636"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.2s" begin="1.0s" repeatCount="indefinite" path="M800,676 L1100,676"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="1.4s" begin="2.0s" repeatCount="indefinite" path="M516,746 L650,746"/></circle>
</svg>
