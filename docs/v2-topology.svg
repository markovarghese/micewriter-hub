<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1320 640" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="mIceWriter v2 system topology: a Spring Boot app embeds the SDK and routes each record by @IcebergEntity table over gRPC to one of three independent per-table engine pipelines (engine-telemetry, engine-audit, engine-model-eval). Each pipeline runs HPA-scaled engine pods backed by per-pod RocksDB and independently commits Parquet files to a shared Iceberg catalog (Nessie or AWS Glue) and object store (MinIO or AWS S3).">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowSky" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#818cf8"/>
    </marker>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b1322"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1320" height="640" fill="#0f172a"/>
  <rect x="0" y="0" width="1320" height="640" fill="url(#bgGrad)"/>

  <!-- title -->
  <text x="40" y="42" fill="#e2e8f0" font-size="22" font-weight="700">mIceWriter &#8212; v2 System Topology</text>
  <text x="41" y="64" fill="#94a3b8" font-size="13">One engine Deployment + Service per Iceberg table &#183; routed by <tspan font-style="italic">@IcebergEntity(table)</tspan></text>

  <!-- legend -->
  <g font-size="11" fill="#94a3b8">
    <circle cx="952" cy="36" r="4.5" fill="#7dd3fc"/>
    <text x="964" y="40">gRPC record (CBOR)</text>
    <circle cx="1112" cy="36" r="4.5" fill="#5eead4"/>
    <text x="1124" y="40">Parquet &#183; S3 PUT + commit</text>
  </g>

  <!-- ============ Kubernetes cluster ============ -->
  <rect x="28" y="92" width="872" height="520" rx="16" fill="#101d33" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="46" y="118" fill="#cbd5e1" font-size="14" font-weight="600">Kubernetes Cluster</text>

  <!-- ============ edges (under nodes) ============ -->
  <!-- App -> pipelines (gRPC) -->
  <path d="M236,345 C330,300 384,196 470,171" fill="none" stroke="#3f4d63" stroke-width="2" marker-end="url(#arrowSky)"/>
  <path d="M236,364 L470,359" fill="none" stroke="#3f4d63" stroke-width="2" marker-end="url(#arrowSky)"/>
  <path d="M236,383 C330,430 384,522 470,547" fill="none" stroke="#3f4d63" stroke-width="2" marker-end="url(#arrowSky)"/>

  <!-- pipelines -> Catalog + Object Store container (commit) -->
  <path d="M830,171 C884,171 906,214 950,232" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <path d="M830,359 L950,365" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <path d="M830,547 C884,547 906,512 950,498" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- edge labels -->
  <text x="352" y="232" fill="#7dd3fc" font-size="11" text-anchor="middle">telemetry_events</text>
  <text x="350" y="350" fill="#7dd3fc" font-size="11" text-anchor="middle">audit_events</text>
  <text x="352" y="488" fill="#7dd3fc" font-size="11" text-anchor="middle">model_eval</text>
  <text x="352" y="246" fill="#64748b" font-size="9.5" text-anchor="middle">gRPC :9090</text>
  <text x="350" y="376" fill="#64748b" font-size="9.5" text-anchor="middle">gRPC :9090</text>
  <text x="352" y="502" fill="#64748b" font-size="9.5" text-anchor="middle">gRPC :9090</text>
  <text x="905" y="200" fill="#5eead4" font-size="10" text-anchor="middle">commit</text>

  <!-- ============ App Pod ============ -->
  <rect x="56" y="300" width="180" height="128" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="146" y="328" fill="#94a3b8" font-size="11" text-anchor="middle">App Pod</text>
  <text x="146" y="354" fill="#e2e8f0" font-size="15" font-weight="600" text-anchor="middle">Spring Boot App</text>
  <text x="146" y="374" fill="#94a3b8" font-size="11" text-anchor="middle">(SDK as Maven dep)</text>
  <text x="146" y="402" fill="#64748b" font-size="10" text-anchor="middle">icebergTemplate.send(pojo)</text>
  <text x="146" y="417" fill="#64748b" font-size="10" text-anchor="middle">route by table</text>

  <!-- ============ Pipeline: engine-telemetry ============ -->
  <g>
    <!-- replica hint -->
    <rect x="494" y="118" width="360" height="118" rx="11" fill="#16243c" stroke="#33415560" stroke-width="1"/>
    <rect x="482" y="112" width="360" height="118" rx="11" fill="#15202f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="498" y="138" fill="#7dd3fc" font-size="13.5" font-weight="600">engine-telemetry</text>
    <rect x="498" y="150" width="178" height="62" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="587" y="174" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Engine pods</text>
    <text x="587" y="192" fill="#94a3b8" font-size="10.5" text-anchor="middle">HPA &#183; gRPC :9090</text>
    <text x="587" y="206" fill="#64748b" font-size="9.5" text-anchor="middle">CBOR&#8594;Arrow&#8594;Parquet</text>
    <!-- arrow engine -> rocksdb -->
    <path d="M676,181 L706,181" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <!-- rocksdb cylinder -->
    <ellipse cx="763" cy="201" rx="52" ry="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="711" y="161" width="104" height="40" fill="#1e1b4b" stroke="none"/>
    <line x1="711" y1="161" x2="711" y2="201" stroke="#818cf8" stroke-width="1.2"/>
    <line x1="815" y1="161" x2="815" y2="201" stroke="#818cf8" stroke-width="1.2"/>
    <ellipse cx="763" cy="161" rx="52" ry="8" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="763" y="186" fill="#c7d2fe" font-size="11" font-weight="600" text-anchor="middle">RocksDB</text>
  </g>

  <!-- ============ Pipeline: engine-audit ============ -->
  <g>
    <rect x="494" y="306" width="360" height="118" rx="11" fill="#16243c" stroke="#33415560" stroke-width="1"/>
    <rect x="482" y="300" width="360" height="118" rx="11" fill="#15202f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="498" y="326" fill="#7dd3fc" font-size="13.5" font-weight="600">engine-audit</text>
    <rect x="498" y="338" width="178" height="62" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="587" y="362" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Engine pods</text>
    <text x="587" y="380" fill="#94a3b8" font-size="10.5" text-anchor="middle">HPA &#183; gRPC :9090</text>
    <text x="587" y="394" fill="#64748b" font-size="9.5" text-anchor="middle">CBOR&#8594;Arrow&#8594;Parquet</text>
    <path d="M676,369 L706,369" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <ellipse cx="763" cy="389" rx="52" ry="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="711" y="349" width="104" height="40" fill="#1e1b4b" stroke="none"/>
    <line x1="711" y1="349" x2="711" y2="389" stroke="#818cf8" stroke-width="1.2"/>
    <line x1="815" y1="349" x2="815" y2="389" stroke="#818cf8" stroke-width="1.2"/>
    <ellipse cx="763" cy="349" rx="52" ry="8" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="763" y="374" fill="#c7d2fe" font-size="11" font-weight="600" text-anchor="middle">RocksDB</text>
  </g>

  <!-- ============ Pipeline: engine-model-eval ============ -->
  <g>
    <rect x="494" y="494" width="360" height="118" rx="11" fill="#16243c" stroke="#33415560" stroke-width="1"/>
    <rect x="482" y="488" width="360" height="118" rx="11" fill="#15202f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="498" y="514" fill="#7dd3fc" font-size="13.5" font-weight="600">engine-model-eval</text>
    <rect x="700" y="503" width="74" height="17" rx="8" fill="#3b2f10" stroke="#f59e0b" stroke-width="1"/>
    <text x="737" y="515" fill="#fcd34d" font-size="9.5" text-anchor="middle">large RAM</text>
    <rect x="498" y="526" width="178" height="62" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="587" y="550" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Engine pods</text>
    <text x="587" y="568" fill="#94a3b8" font-size="10.5" text-anchor="middle">HPA &#183; gRPC :9090</text>
    <text x="587" y="582" fill="#64748b" font-size="9.5" text-anchor="middle">CBOR&#8594;Arrow&#8594;Parquet</text>
    <path d="M676,557 L706,557" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <ellipse cx="763" cy="577" rx="52" ry="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="711" y="537" width="104" height="40" fill="#1e1b4b" stroke="none"/>
    <line x1="711" y1="537" x2="711" y2="577" stroke="#818cf8" stroke-width="1.2"/>
    <line x1="815" y1="537" x2="815" y2="577" stroke="#818cf8" stroke-width="1.2"/>
    <ellipse cx="763" cy="537" rx="52" ry="8" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="763" y="562" fill="#c7d2fe" font-size="11" font-weight="600" text-anchor="middle">RocksDB</text>
  </g>

  <!-- ============ Catalog + Object Store ============ -->
  <rect x="950" y="150" width="340" height="430" rx="14" fill="#11241f" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="968" y="176" fill="#99f6e4" font-size="13" font-weight="600">Catalog + Object Store</text>
  <text x="968" y="193" fill="#5b7d76" font-size="10">shared across all pipelines</text>

  <!-- Catalog cylinder -->
  <ellipse cx="1120" cy="330" rx="130" ry="14" fill="#134e4a" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="990" y="252" width="260" height="78" fill="#134e4a" stroke="none"/>
  <line x1="990" y1="252" x2="990" y2="330" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="1250" y1="252" x2="1250" y2="330" stroke="#2dd4bf" stroke-width="2"/>
  <ellipse cx="1120" cy="252" rx="130" ry="14" fill="#155e57" stroke="#2dd4bf" stroke-width="2"/>
  <text x="1120" y="290" fill="#ccfbf1" font-size="15" font-weight="700" text-anchor="middle">Iceberg Catalog</text>
  <text x="1120" y="310" fill="#99f6e4" font-size="11.5" text-anchor="middle">Apache Nessie / AWS Glue</text>

  <!-- Object Store cylinder -->
  <ellipse cx="1120" cy="540" rx="130" ry="14" fill="#134e4a" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="990" y="450" width="260" height="90" fill="#134e4a" stroke="none"/>
  <line x1="990" y1="450" x2="990" y2="540" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="1250" y1="450" x2="1250" y2="540" stroke="#2dd4bf" stroke-width="2"/>
  <ellipse cx="1120" cy="450" rx="130" ry="14" fill="#155e57" stroke="#2dd4bf" stroke-width="2"/>
  <text x="1120" y="492" fill="#ccfbf1" font-size="15" font-weight="700" text-anchor="middle">Object Store</text>
  <text x="1120" y="512" fill="#99f6e4" font-size="11.5" text-anchor="middle">MinIO / AWS S3</text>

  <!-- footnote -->
  <text x="46" y="600" fill="#64748b" font-size="10.5">Pipelines are independent &#8212; no cross-pipeline coordination, no shared state. Each pinned to one table via MICEWRITER_TABLE.</text>

  <!-- ============ animated packets ============ -->
  <!-- App -> telemetry -->
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.6s" repeatCount="indefinite" path="M236,345 C330,300 384,196 470,171"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.6s" begin="0.8s" repeatCount="indefinite" path="M236,345 C330,300 384,196 470,171"/></circle>
  <!-- App -> audit -->
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.5s" repeatCount="indefinite" path="M236,364 L470,359"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.5s" begin="0.75s" repeatCount="indefinite" path="M236,364 L470,359"/></circle>
  <!-- App -> model-eval -->
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.7s" repeatCount="indefinite" path="M236,383 C330,430 384,522 470,547"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.7s" begin="0.85s" repeatCount="indefinite" path="M236,383 C330,430 384,522 470,547"/></circle>
  <!-- engine -> rocksdb (per pipeline) -->
  <circle r="3.5" fill="#a5b4fc"><animateMotion dur="1.1s" repeatCount="indefinite" path="M676,181 L706,181"/></circle>
  <circle r="3.5" fill="#a5b4fc"><animateMotion dur="1.1s" repeatCount="indefinite" path="M676,369 L706,369"/></circle>
  <circle r="3.5" fill="#a5b4fc"><animateMotion dur="1.1s" repeatCount="indefinite" path="M676,557 L706,557"/></circle>
  <!-- pipelines -> store (commit, teal, slower / periodic flush feel) -->
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M830,171 C884,171 906,214 950,232"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M830,359 L950,365"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M830,547 C884,547 906,512 950,498"/></circle>
</svg>
