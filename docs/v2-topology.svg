<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1320 640" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="mIceWriter v2 system topology with leader election.">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="arrowSky" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#38bdf8"/></marker>
    <marker id="arrowTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <marker id="arrowIndigo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#818cf8"/></marker>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1320" height="640" fill="#0f172a"/>
  <rect x="0" y="0" width="1320" height="640" fill="url(#bgGrad)"/>

  <!-- title -->
  <text x="40" y="42" fill="#e2e8f0" font-size="22" font-weight="700">mIceWriter &#8212; v2 System Topology</text>
  <text x="41" y="64" fill="#94a3b8" font-size="13">One engine Deployment per Iceberg table (Worker pods + Leader pod) &#183; routed by <tspan font-style="italic">@IcebergEntity(table)</tspan></text>

  <!-- legend -->
  <g font-size="11" fill="#94a3b8">
    <circle cx="852" cy="36" r="4.5" fill="#7dd3fc"/><text x="864" y="40">gRPC record</text>
    <circle cx="982" cy="36" r="4.5" fill="#a5b4fc"/><text x="994" y="40">Internal gRPC CommitBatch</text>
    <circle cx="1162" cy="36" r="4.5" fill="#5eead4"/><text x="1174" y="40">Parquet PUT / Commit</text>
  </g>

  <rect x="28" y="92" width="872" height="520" rx="16" fill="#101d33" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="46" y="118" fill="#cbd5e1" font-size="14" font-weight="600">Kubernetes Cluster</text>

  <!-- App Pod -->
  <rect x="56" y="300" width="180" height="128" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="146" y="328" fill="#94a3b8" font-size="11" text-anchor="middle">App Pod</text>
  <text x="146" y="354" fill="#e2e8f0" font-size="15" font-weight="600" text-anchor="middle">Spring Boot App</text>
  <text x="146" y="374" fill="#94a3b8" font-size="11" text-anchor="middle">(SDK as Maven dep)</text>

  <!-- edge labels -->
  <text x="332" y="232" fill="#7dd3fc" font-size="11" text-anchor="middle">telemetry_events</text>
  <text x="330" y="350" fill="#7dd3fc" font-size="11" text-anchor="middle">audit_events</text>
  <text x="332" y="488" fill="#7dd3fc" font-size="11" text-anchor="middle">model_eval</text>

  <text x="920" y="180" fill="#5eead4" font-size="10" text-anchor="middle">5-min commit</text>
  <text x="920" y="450" fill="#5eead4" font-size="10" text-anchor="middle">S3 PUT</text>

  <!-- App -> pipelines (gRPC) -->
  <path d="M236,345 C330,300 384,150 430,150" fill="none" stroke="#3f4d63" stroke-width="2" marker-end="url(#arrowSky)"/>
  <path d="M236,364 C330,364 384,330 430,330" fill="none" stroke="#3f4d63" stroke-width="2" marker-end="url(#arrowSky)"/>
  <path d="M236,383 C330,430 384,510 430,510" fill="none" stroke="#3f4d63" stroke-width="2" marker-end="url(#arrowSky)"/>

  <!-- ============ Catalog + Object Store ============ -->
  <rect x="950" y="150" width="340" height="430" rx="14" fill="#11241f" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="968" y="176" fill="#99f6e4" font-size="13" font-weight="600">Catalog + Object Store</text>

  <ellipse cx="1120" cy="330" rx="130" ry="14" fill="#134e4a" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="990" y="252" width="260" height="78" fill="#134e4a" stroke="none"/>
  <line x1="990" y1="252" x2="990" y2="330" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="1250" y1="252" x2="1250" y2="330" stroke="#2dd4bf" stroke-width="2"/>
  <ellipse cx="1120" cy="252" rx="130" ry="14" fill="#155e57" stroke="#2dd4bf" stroke-width="2"/>
  <text x="1120" y="290" fill="#ccfbf1" font-size="15" font-weight="700" text-anchor="middle">Iceberg Catalog</text>

  <ellipse cx="1120" cy="540" rx="130" ry="14" fill="#134e4a" stroke="#2dd4bf" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="990" y="450" width="260" height="90" fill="#134e4a" stroke="none"/>
  <line x1="990" y1="450" x2="990" y2="540" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="1250" y1="450" x2="1250" y2="540" stroke="#2dd4bf" stroke-width="2"/>
  <ellipse cx="1120" cy="450" rx="130" ry="14" fill="#155e57" stroke="#2dd4bf" stroke-width="2"/>
  <text x="1120" y="492" fill="#ccfbf1" font-size="15" font-weight="700" text-anchor="middle">Object Store</text>

  <!-- engine-telemetry -->
  <g>
    <rect x="420" y="118" width="440" height="138" rx="11" fill="#15202f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="430" y="138" fill="#7dd3fc" font-size="13.5" font-weight="600">engine-telemetry</text>
    
    <!-- Worker Box -->
    <rect x="430" y="125" width="130" height="55" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="495" y="149" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Worker Pods</text>
    <text x="495" y="167" fill="#94a3b8" font-size="10.5" text-anchor="middle">HPA</text>
    
    <!-- RocksDB -->
    <ellipse cx="500" cy="235" rx="45" ry="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="455" y="210" width="90" height="25" fill="#1e1b4b" stroke="none"/>
    <line x1="455" y1="210" x2="455" y2="235" stroke="#818cf8" stroke-width="1.2"/>
    <line x1="545" y1="210" x2="545" y2="235" stroke="#818cf8" stroke-width="1.2"/>
    <ellipse cx="500" cy="210" rx="45" ry="8" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="500" y="225" fill="#c7d2fe" font-size="10" font-weight="600" text-anchor="middle">RocksDB</text>
    
    <!-- Leader Box -->
    <rect x="670" y="125" width="110" height="50" rx="8" fill="#1e293b" stroke="#2dd4bf" stroke-width="1.2"/>
    <text x="725" y="149" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Leader Pod</text>
    <text x="725" y="167" fill="#94a3b8" font-size="10.5" text-anchor="middle">K8s Lease</text>
    
    <!-- Paths -->
    <path d="M560,150 L670,150" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <path d="M560,175 L860,175 C900,175 910,490 950,490" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <path d="M780,150 L860,150 C900,150 910,290 950,290" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
  </g>
  <!-- engine-audit -->
  <g>
    <rect x="420" y="298" width="440" height="138" rx="11" fill="#15202f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="430" y="318" fill="#7dd3fc" font-size="13.5" font-weight="600">engine-audit</text>
    
    <!-- Worker Box -->
    <rect x="430" y="305" width="130" height="55" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="495" y="329" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Worker Pods</text>
    <text x="495" y="347" fill="#94a3b8" font-size="10.5" text-anchor="middle">HPA</text>
    
    <!-- RocksDB -->
    <ellipse cx="500" cy="415" rx="45" ry="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="455" y="390" width="90" height="25" fill="#1e1b4b" stroke="none"/>
    <line x1="455" y1="390" x2="455" y2="415" stroke="#818cf8" stroke-width="1.2"/>
    <line x1="545" y1="390" x2="545" y2="415" stroke="#818cf8" stroke-width="1.2"/>
    <ellipse cx="500" cy="390" rx="45" ry="8" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="500" y="405" fill="#c7d2fe" font-size="10" font-weight="600" text-anchor="middle">RocksDB</text>
    
    <!-- Leader Box -->
    <rect x="670" y="305" width="110" height="50" rx="8" fill="#1e293b" stroke="#2dd4bf" stroke-width="1.2"/>
    <text x="725" y="329" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Leader Pod</text>
    <text x="725" y="347" fill="#94a3b8" font-size="10.5" text-anchor="middle">K8s Lease</text>
    
    <!-- Paths -->
    <path d="M560,330 L670,330" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <path d="M560,355 L860,355 C900,355 910,490 950,490" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <path d="M780,330 L860,330 C900,330 910,290 950,290" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
  </g>
  <!-- engine-model-eval -->
  <g>
    <rect x="420" y="478" width="440" height="138" rx="11" fill="#15202f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="430" y="498" fill="#7dd3fc" font-size="13.5" font-weight="600">engine-model-eval</text>
    
    <!-- Worker Box -->
    <rect x="430" y="485" width="130" height="55" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="495" y="509" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Worker Pods</text>
    <text x="495" y="527" fill="#94a3b8" font-size="10.5" text-anchor="middle">HPA</text>
    
    <!-- RocksDB -->
    <ellipse cx="500" cy="595" rx="45" ry="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="455" y="570" width="90" height="25" fill="#1e1b4b" stroke="none"/>
    <line x1="455" y1="570" x2="455" y2="595" stroke="#818cf8" stroke-width="1.2"/>
    <line x1="545" y1="570" x2="545" y2="595" stroke="#818cf8" stroke-width="1.2"/>
    <ellipse cx="500" cy="570" rx="45" ry="8" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
    <text x="500" y="585" fill="#c7d2fe" font-size="10" font-weight="600" text-anchor="middle">RocksDB</text>
    
    <!-- Leader Box -->
    <rect x="670" y="485" width="110" height="50" rx="8" fill="#1e293b" stroke="#2dd4bf" stroke-width="1.2"/>
    <text x="725" y="509" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Leader Pod</text>
    <text x="725" y="527" fill="#94a3b8" font-size="10.5" text-anchor="middle">K8s Lease</text>
    
    <!-- Paths -->
    <path d="M560,510 L670,510" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowIndigo)"/>
    <path d="M560,535 L860,535 C900,535 910,490 950,490" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <path d="M780,510 L860,510 C900,510 910,290 950,290" fill="none" stroke="#1f6e63" stroke-width="2" marker-end="url(#arrowTeal)"/>
  </g>


  <!-- ============ animated packets ============ -->
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.6s" repeatCount="indefinite" path="M236,345 C330,300 384,150 430,150"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.5s" repeatCount="indefinite" path="M236,364 C330,364 384,330 430,330"/></circle>
  <circle r="4.5" fill="#7dd3fc"><animateMotion dur="1.7s" repeatCount="indefinite" path="M236,383 C330,430 384,510 430,510"/></circle>

  <circle r="3.5" fill="#a5b4fc"><animateMotion dur="1.1s" repeatCount="indefinite" path="M560,150 L670,150"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M560,175 L860,175 C900,175 910,490 950,490"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M780,150 L860,150 C900,150 910,290 950,290"/></circle>

  <circle r="3.5" fill="#a5b4fc"><animateMotion dur="1.1s" repeatCount="indefinite" path="M560,330 L670,330"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M560,355 L860,355 C900,355 910,490 950,490"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M780,330 L860,330 C900,330 910,290 950,290"/></circle>

  <circle r="3.5" fill="#a5b4fc"><animateMotion dur="1.1s" repeatCount="indefinite" path="M560,510 L670,510"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M560,535 L860,535 C900,535 910,490 950,490"/></circle>
  <circle r="4.5" fill="#5eead4"><animateMotion dur="2.4s" repeatCount="indefinite" path="M780,510 L860,510 C900,510 910,290 950,290"/></circle>

</svg>
